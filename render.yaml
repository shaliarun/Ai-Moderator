services:
  - type: web
    name: insightly-api
    env: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_FALLBACK_MODELS
        sync: false
      - key: OPENAI_TIMEOUT_MS
        value: "12000"
      - key: ENABLE_ANTHROPIC_FALLBACK
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        sync: false
      - key: ANTHROPIC_FALLBACK_MODELS
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
