kind = "web"
previewPath = "/"
title = "UX Research AI Moderator"
version = "1.0.0"
id = "artifacts/ux-moderator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22627

[services.development]
run = "pnpm --filter @workspace/ux-moderator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ux-moderator", "run", "build" ]
publicDir = "artifacts/ux-moderator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22627"
BASE_PATH = "/"
